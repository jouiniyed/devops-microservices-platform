apiVersion: argoproj.io/v1alpha1
kind: Application 
metadata: 
  name: microservices-demo
  namespace: argocd

spec: 
  project: default
  source: 
    repoURL: https://github.com/jouiniyed/devops-microservices-platform
    targetRevision: HEAD
    path: k8s/microservices-demo
  
  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true