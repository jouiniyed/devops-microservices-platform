name : CI/CD Pipeline 

on: 
  push: 
    branches: [ main ]

env: 
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  trivy-scan: 
    name: Security Scan 
    runs-on: ubuntu-latest
    steps: 
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Scan Kubernetes manifests 
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: k8s/
          exit-code: 0
          severity: CRITICAL,HIGH
          format: table 
      
      - name: Scan Terraform files 
        uses: aquasecurity/trivy-action@master
        with: 
          scan-type: config
          scan-ref: terraform/
          exit-code: 0
          severity: CRITICAL,HIGH
          format: table 
  
  build-push:
    name: Build & Push Image 
    runs-on: ubuntu-latest
    needs: trivy-scan
    if: github.ref == 'refs/heads/main'
    steps: 
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Log in to GHCR 
        uses: docker/login-action@v3
        with: 
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build & push 
        uses: docker/build-push-action@v5
        with: 
          context: src/frontend
          file: src/frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:sha-${{ github.sha }}
    
  update-manifest:
    name: Update K8s manifest
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with: 
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update image tag in manifest 
        run: | 
          IMAGE_TAG="sha-${{ github.sha }}"
          sed -i "s|image: ghcr.io/${{ github.repository }}/frontend:.*|image: ghcr.io/${{ github.repository }}/frontend:${IMAGE_TAG}|g" k8s/microservices-demo/kubernetes-manifests.yaml
          git config user.name "CI Bot"
          git add k8s/microservices-demo/kubernetes-manifests.yaml
          git commit -m "ci: update frontend to ${IMAGE_TAG} [skip ci]"
          git push 